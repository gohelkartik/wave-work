<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join WorkWave | Freelance Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1dbf73;
            --primary-light: #e8f7f0;
            --dark: #222325;
            --light-grey: #f7f7f7;
            --border: #e4e5e7;
            --white: #ffffff;
            --text-muted: #62646a;
            --shadow: 0 15px 50px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-grey);
            color: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .signup-container {
            background: var(--white);
            width: 100%;
            max-width: 550px;
            padding: 50px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
        }

        /* Added Home Link Style */
        .home-nav {
            position: absolute;
            top: 25px;
            left: 30px;
        }

        .home-nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .home-nav a:hover {
            color: var(--primary);
        }

        .signup-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            text-decoration: none;
            color: var(--dark);
            display: inline-block;
            margin-bottom: 10px;
        }

        .logo span { color: var(--primary); }

        .signup-header h2 {
            font-size: 26px;
            font-weight: 700;
            color: #404145;
            letter-spacing: -0.5px;
        }

        .signup-header p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 15px;
        }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            color: var(--dark);
            transition: 0.2s ease;
            font-size: 14px;
        }

        .social-btn:hover {
            background: var(--light-grey);
            border-color: #b5b6ba;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            color: #b5b6ba;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider:not(:empty)::before { margin-right: 20px; }
        .divider:not(:empty)::after { margin-left: 20px; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #404145;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #b5b6ba;
            pointer-events: none;
            transition: 0.3s;
        }

        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            background: white;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(29, 191, 115, 0.12);
        }

        .input-wrapper input:focus + i {
            color: var(--primary);
        }

        .terms-check {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 25px 0;
            cursor: pointer;
            font-size: 14px;
            line-height: 1.4;
            color: var(--text-muted);
        }

        .terms-check input {
            margin-top: 3px;
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
        }

        .terms-check a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-btn {
            width: 100%;
            padding: 16px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .signup-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(29, 191, 115, 0.2);
        }

        .login-link {
            text-align: center;
            margin-top: 35px;
            font-size: 15px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 25px;
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        @media (max-width: 600px) {
            .signup-container { padding: 40px 20px; }
            .form-row, .social-grid { grid-template-columns: 1fr; }
            .signup-header h2 { font-size: 22px; }
            .home-nav { top: 15px; left: 20px; }
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <nav class="home-nav">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Home</a>
        </nav>

        <header class="signup-header">
            <a href="index.html" class="logo">WorkWave<span>.</span></a>
            <h2>Create your account</h2>
            <p>Join the world's most trusted freelance ecosystem</p>
        </header>

        <div class="social-grid">
            <button class="social-btn">
                <i class="fab fa-google"></i> Google
            </button>
            <button class="social-btn">
                <i class="fab fa-apple"></i> Apple
            </button>
        </div>

        <div class="divider">Or register with email</div>

        <form action="#" id="signupForm">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="surname" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="name@company.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Account Type</label>
                <div class="input-wrapper">
                    <i class="fas fa-briefcase"></i>
                    <select required style="padding-left: 48px;">
                        <option value="" disabled selected>I want to...</option>
                        <option value="freelancer">Work as a Freelancer</option>
                        <option value="client">Hire for a Project</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="At least 8 characters" required minlength="8">
                </div>
            </div>

            <label class="terms-check">
                <input type="checkbox" required>
                <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. I understand that WorkWave will use my data to provide services.</span>
            </label>

            <button type="submit" class="signup-btn">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('.signup-btn');
            const originalText = btn.innerText;
            
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Creating Account...';
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.8';

            setTimeout(() => {
                alert('Account created successfully! Welcome to WorkWave.');
                btn.innerHTML = originalText;
                btn.style.pointerEvents = 'all';
                btn.style.opacity = '1';
                window.location.href = 'login.html';
            }, 2000);
        });
    </script>
</body>
</html>
